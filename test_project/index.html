<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Git Sync Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 {
            margin-bottom: 20px;
        }
        .status {
            display: inline-block;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Auto Git Sync Demo</h1>
        <p>This file is being watched by the auto-sync system.</p>
        <p>Any changes you make will be automatically:</p>
        <ul style="list-style: none; padding: 0;">
            <li>✅ Committed to dev branch</li>
            <li>✅ Pushed to GitHub</li>
            <li>✅ Create a Pull Request</li>
        </ul>
        <div class="status" id="status">System Active</div>
        <p style="margin-top: 30px; font-size: 12px;">
            Last updated: <span id="timestamp"></span>
        </p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
